<!DOCTYPE html>
<html>

<head>
    <title>Cart</title>
</head>

<body>

<h1>Your Cart</h1>

{% for item in cart_items %}

<div>

    <img src="{{ url_for('static', filename=item.image) }}" width="150">

    <h2>{{ item.name }} ×{{ item.qty }}</h2>

    <p>₹ {{ item.subtotal }}</p>

</div>

{% endfor %}

<h1>Total: ₹ {{ total }}</h1>

</body>

</html>
