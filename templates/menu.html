<!DOCTYPE html>
<html>

<head>
    <title>Restaurant Menu</title>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
            padding:20px;
        }

        h1{
            text-align:center;
        }

        .container{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
            justify-content:center;
        }

        .card{
            background:white;
            width:250px;
            border-radius:10px;
            padding:15px;
            box-shadow:0px 2px 10px rgba(0,0,0,0.1);
        }

        .card img{
            width:100%;
            height:180px;
            object-fit:cover;
            border-radius:10px;
        }

        button{
            background:black;
            color:white;
            padding:10px;
            border:none;
            border-radius:5px;
            width:100%;
            cursor:pointer;
        }

    </style>
</head>

<body>

    <h1>Table {{ table_no }} Menu</h1>

    <div class="container">

        {% for food in foods %}

        <div class="card">

            <img src="{{ url_for('static', filename=food.image) }}" alt="food">

            <h2>{{ food.name }}</h2>

            <p>₹ {{ food.price }}</p>
            <div class="cart-controls">

    <button onclick="decreaseItem('{{ loop.index0 }}')">  -  Add to cart +   </button>

</div>
        </div>

        {% endfor %}

</div>

<script>

let cart = {}

function increaseItem(id){

    if(cart[id]){
        cart[id]++
    }
    else{
        cart[id] = 1
    }

    document.getElementById(`qty-${id}`).innerText = cart[id]

    updateCart()
}

function decreaseItem(id){

    if(cart[id] && cart[id] > 0){

        cart[id]--

        document.getElementById(`qty-${id}`).innerText = cart[id]

        updateCart()
    }
}

function updateCart(){

    fetch('/update_cart', {

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body: JSON.stringify(cart)

    })
}

</script>

</body>
</html>
